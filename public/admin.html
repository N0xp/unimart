<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Admin-specific navbar (no shared navbar needed) -->
    <nav class="navbar navbar-expand-lg navbar-unimart fixed-top" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-shop"></i> UniMart Admin</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="index.html" class="btn btn-sm btn-outline-light me-3">Exit Admin</a>
            </div>
        </div>
    </nav>

    <div class="page-wrapper" style="padding-top:100px;">
        <div class="container">
            <h1 class="page-title"><i class="bi bi-shield-lock"></i> Admin Dashboard</h1>

            <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="products-tab" data-bs-toggle="tab"
                        data-bs-target="#products-pane" type="button" role="tab">All Products</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="orders-tab" data-bs-toggle="tab" data-bs-target="#orders-pane"
                        type="button" role="tab">All Orders</button>
                </li>
            </ul>

            <div class="tab-content" id="adminTabsContent">
                <!-- Products Tab -->
                <div class="tab-pane fade show active" id="products-pane" role="tabpanel" tabindex="0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Image</th>
                                    <th>Title</th>
                                    <th>Seller</th>
                                    <th>Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="adminProductsBody">
                                <tr>
                                    <td colspan="6" class="text-center py-4">Loading products...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Orders Tab -->
                <div class="tab-pane fade" id="orders-pane" role="tabpanel" tabindex="0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Order ID</th>
                                    <th>Date</th>
                                    <th>Buyer ID</th>
                                    <th>Total Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="adminOrdersBody">
                                <tr>
                                    <td colspan="5" class="text-center py-4">Loading orders...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="deleteModalBody">Are you sure you want to delete this resource?</div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Issue #2: Server-side admin check is enforced at the route level in server.js
        // This client-side check is a secondary guard for UX
        $(document).ready(function () {
            requireLogin(function (user) {
                if (!user.is_admin) {
                    showToast('Access Denied. Admins only.', 'danger');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return;
                }
                loadAdminData();
            });

            // Tab change events
            $('button[data-bs-toggle="tab"]').on('shown.bs.tab', function () {
                loadAdminData();
            });

            // Setup Delete Modal
            let deleteType = null;
            let deleteId = null;

            $(document).on('click', '.admin-delete-btn', function () {
                deleteType = $(this).data('type');
                deleteId = $(this).data('id');
                $('#deleteModalBody').text(`Are you sure you want to delete ${deleteType} #${deleteId}? This action cannot be undone.`);
                new bootstrap.Modal($('#deleteModal')[0]).show();
            });

            $('#confirmDeleteBtn').on('click', function () {
                if (!deleteId || !deleteType) return;
                const btn = $(this);
                btn.prop('disabled', true).text('Deleting...');

                $.ajax({
                    url: `/api/${deleteType}s/${deleteId}`,
                    method: 'DELETE',
                    success: function () {
                        showToast(`${deleteType.charAt(0).toUpperCase() + deleteType.slice(1)} deleted successfully.`, 'success');
                        bootstrap.Modal.getInstance($('#deleteModal')[0]).hide();
                        loadAdminData();
                    },
                    error: function (xhr) {
                        showToast(`Failed to delete: ${xhr.responseJSON?.error || 'Unknown error'}`, 'danger');
                    },
                    complete: function () {
                        btn.prop('disabled', false).text('Delete');
                    }
                });
            });
        });

        function loadAdminData() {
            const activeTab = $('.nav-link.active').attr('id');
            if (activeTab === 'products-tab') {
                $.get('/api/products', function (products) {
                    const tbody = $('#adminProductsBody');
                    tbody.empty();
                    if (products.length === 0) {
                        tbody.html('<tr><td colspan="6" class="text-center py-4">No products found.</td></tr>');
                        return;
                    }
                    products.forEach(p => {
                        tbody.append(`
                            <tr>
                                <td>${p.id}</td>
                                <td><img src="${escapeHtml(p.image_url) || 'https://placehold.co/100x100?text=No+Img'}" style="width:50px; height:50px; object-fit:cover; border-radius:8px;"></td>
                                <td><a href="product-detail.html?id=${p.id}" target="_blank">${escapeHtml(p.title)}</a></td>
                                <td>${escapeHtml(p.seller_name)}</td>
                                <td>AED ${parseFloat(p.price).toFixed(2)}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-danger admin-delete-btn" data-type="product" data-id="${p.id}">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </td>
                            </tr>
                        `);
                    });
                });
            } else if (activeTab === 'orders-tab') {
                $.get('/api/orders', function (orders) {
                    const tbody = $('#adminOrdersBody');
                    tbody.empty();
                    if (orders.length === 0) {
                        tbody.html('<tr><td colspan="5" class="text-center py-4">No orders found.</td></tr>');
                        return;
                    }
                    orders.forEach(o => {
                        const date = new Date(o.created_at).toLocaleString();
                        tbody.append(`
                            <tr>
                                <td>${o.id}</td>
                                <td>${escapeHtml(date)}</td>
                                <td>Buyer ID: ${o.buyer_id}</td>
                                <td>AED ${parseFloat(o.total_price).toFixed(2)}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-danger admin-delete-btn" data-type="order" data-id="${o.id}">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </td>
                            </tr>
                        `);
                    });
                });
            }
        }
    </script>
</body>

</html>
