<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card animate-fade-in-up">
            <div class="text-center mb-4">
                <a href="index.html" style="font-size:1.8rem;font-weight:800" class="text-decoration-none">
                    <i class="bi bi-shop" style="color:var(--primary)"></i>
                    <span style="color:var(--dark)">Uni</span><span style="color:var(--primary)">Mart</span>
                </a>
            </div>
            <h2 class="text-center">Welcome Back</h2>
            <p class="text-center text-muted mb-4">Log in to your account</p>

            <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email or Username</label>
                    <input type="text" class="form-control" id="loginEmail" placeholder="Email or username" required>
                    <div class="form-error">Please enter your email or username.</div>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password"
                        required>
                    <div class="form-error">Password is required.</div>
                </div>
                <button type="submit" class="btn btn-unimart" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Log In
                </button>
            </form>
            <p class="text-center mt-3 mb-0 text-muted">
                Don't have an account? <a href="register.html" class="fw-bold">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/validation.js"></script>
    <script>
        $(document).ready(function () {
            $('#loginForm').on('submit', function (e) {
                e.preventDefault();
                if (!validateLoginForm()) return;

                const email = $('#loginEmail').val().trim();
                const password = $('#loginPassword').val();

                $('#loginBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Logging in...');

                $.ajax({
                    url: '/api/auth/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email, password }),
                    success: function (res) {
                        window.location.href = 'welcome.html';
                    },
                    error: function (xhr) {
                        const msg = xhr.responseJSON?.error || 'Login failed.';
                        $('#loginAlert').text(msg).removeClass('d-none');
                        $('#loginBtn').prop('disabled', false).html('<i class="bi bi-box-arrow-in-right"></i> Log In');
                    }
                });
            });
        });
    </script>
</body>

</html>
