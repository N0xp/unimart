<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card animate-fade-in-up">
            <div class="text-center mb-4">
                <a href="index.html" style="font-size:1.8rem;font-weight:800" class="text-decoration-none">
                    <i class="bi bi-shop" style="color:var(--primary)"></i>
                    <span style="color:var(--dark)">Uni</span><span style="color:var(--primary)">Mart</span>
                </a>
            </div>
            <h2 class="text-center">Create Account</h2>
            <p class="text-center text-muted mb-4">Join UniMart — it's free!</p>

            <div id="registerAlert" class="alert d-none" role="alert"></div>

            <form id="registerForm" novalidate>
                <div class="mb-3">
                    <label for="regName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="regName" placeholder="Your full name" required>
                    <div class="form-error"></div>
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="regEmail" placeholder="you@hct.ac.ae" required>
                    <div class="form-error"></div>
                </div>
                <div class="mb-3">
                    <label for="regPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" placeholder="Min. 6 characters"
                        required>
                    <div class="form-error"></div>
                </div>
                <div class="mb-3">
                    <label for="regConfirm" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="regConfirm" placeholder="Re-enter password"
                        required>
                    <div class="form-error"></div>
                </div>
                <div class="mb-3">
                    <label for="regPhone" class="form-label">Phone <span class="text-muted">(optional)</span></label>
                    <input type="tel" class="form-control" id="regPhone" placeholder="05XXXXXXXX">
                </div>
                <button type="submit" class="btn btn-unimart" id="registerBtn">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>
            <p class="text-center mt-3 mb-0 text-muted">
                Already have an account? <a href="login.html" class="fw-bold">Log In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/validation.js"></script>
    <script>
        $(document).ready(function () {
            $('#registerForm').on('submit', function (e) {
                e.preventDefault();
                if (!validateRegisterForm()) return;

                const data = {
                    name: $('#regName').val().trim(),
                    email: $('#regEmail').val().trim(),
                    password: $('#regPassword').val(),
                    phone: $('#regPhone').val().trim() || null
                };

                $('#registerBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Creating account...');

                $.ajax({
                    url: '/api/auth/register',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (res) {
                        $('#registerAlert').text('Account created! Redirecting to login...').removeClass('d-none alert-danger').addClass('alert-success');
                        setTimeout(() => window.location.href = 'login.html', 1500);
                    },
                    error: function (xhr) {
                        const msg = xhr.responseJSON?.error || 'Registration failed.';
                        $('#registerAlert').text(msg).removeClass('d-none alert-success').addClass('alert-danger');
                        $('#registerBtn').prop('disabled', false).html('<i class="bi bi-person-plus"></i> Create Account');
                    }
                });
            });
        });
    </script>
</body>

</html>
