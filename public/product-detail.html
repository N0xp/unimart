<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Shared Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="page-wrapper" style="padding-top:100px;">
        <div class="container">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item"><a href="catalog.html">Products</a></li>
                    <li class="breadcrumb-item active" id="breadcrumbTitle">Product Detail</li>
                </ol>
            </nav>

            <div class="row g-5" id="productContent">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="text-muted mt-2">Loading product...</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-unimart">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;margin-top:0;padding-top:0;">
                <p class="mb-0">&copy; 2025 UniMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function () {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            if (!productId) {
                $('#productContent').html('<div class="col-12 text-center py-5"><h3 class="text-muted">No product specified.</h3><a href="catalog.html" class="btn btn-unimart mt-3">Browse Products</a></div>');
                return;
            }

            $.get(`/api/products/${productId}`, function (p) {
                document.title = `${escapeHtml(p.title)} — UniMart`;
                $('#breadcrumbTitle').text(p.title);
                $('#productContent').html(`
          <div class="col-md-6 animate-fade-in-up">
            <img src="${escapeHtml(p.image_url) || 'https://placehold.co/600x450/e2e8f0/475569?text=No+Image'}" class="img-fluid rounded-4 shadow" alt="${escapeHtml(p.title)}" style="width:100%; max-height:450px; object-fit:cover;">
          </div>
          <div class="col-md-6 animate-fade-in-up animate-delay-1">
            <span class="card-category mb-2">${escapeHtml(p.category_name)}</span>
            <h1 class="fw-bold mt-2" style="font-size:2rem;">${escapeHtml(p.title)}</h1>
            <p class="card-price" style="font-size:2rem;">AED ${parseFloat(p.price).toFixed(2)}</p>
            <hr>
            <h5 class="fw-bold">Description</h5>
            <p class="text-muted">${escapeHtml(p.description)}</p>
            <hr>
            <div class="d-flex align-items-center gap-3 mb-4">
              <i class="bi bi-person-circle" style="font-size:2rem; color:var(--primary);"></i>
              <div>
                <strong>${escapeHtml(p.seller_name)}</strong><br>
                <small class="text-muted">${escapeHtml(p.seller_email)}</small>
              </div>
            </div>
            <div class="d-flex gap-3">
              <button class="btn btn-unimart btn-lg" id="addToCartBtn" data-id="${p.id}">
                <i class="bi bi-cart-plus"></i> Add to Cart
              </button>
              <a href="catalog.html" class="btn btn-unimart-secondary btn-lg">
                <i class="bi bi-arrow-left"></i> Back
              </a>
            </div>
          </div>
        `);

                // Add to cart handler
                $('#addToCartBtn').on('click', function () {
                    $.ajax({
                        url: '/api/cart',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ product_id: p.id, quantity: 1 }),
                        success: function () {
                            showToast('Added to cart!', 'success');
                            updateCartBadge();
                        },
                        error: function (xhr) {
                            if (xhr.status === 401) {
                                showToast('Please log in to add items to cart.', 'warning');
                                setTimeout(() => window.location.href = 'login.html', 1500);
                            } else {
                                showToast(xhr.responseJSON?.error || 'Failed to add to cart.', 'danger');
                            }
                        }
                    });
                });
            }).fail(function () {
                $('#productContent').html('<div class="col-12 text-center py-5"><h3 class="text-muted">Product not found.</h3><a href="catalog.html" class="btn btn-unimart mt-3">Browse Products</a></div>');
            });
        });
    </script>
</body>

</html>
