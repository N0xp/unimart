<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Shared Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dashboard Header -->
    <div class="dashboard-header" style="padding-top:100px;">
        <div class="container">
            <h1 class="animate-fade-in-up">Welcome, <span id="welcomeName">Student</span>! 👋</h1>
            <p class="opacity-75 animate-fade-in-up animate-delay-1">Here's your UniMart overview</p>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="container" style="margin-top:-2rem; position:relative; z-index:2;">
        <div class="row g-4">
            <div class="col-md-4 animate-fade-in-up animate-delay-1">
                <div class="stat-card">
                    <div class="stat-number" id="statListings">0</div>
                    <div class="stat-label">My Listings</div>
                    <a href="my-listings.html" class="btn btn-sm btn-unimart-secondary mt-2">Manage <i
                            class="bi bi-arrow-right"></i></a>
                </div>
            </div>
            <div class="col-md-4 animate-fade-in-up animate-delay-2">
                <div class="stat-card">
                    <div class="stat-number" id="statOrders">0</div>
                    <div class="stat-label">My Orders</div>
                    <!-- Issue #18 FIX: Link to orders.html instead of checkout.html -->
                    <a href="orders.html" class="btn btn-sm btn-unimart-secondary mt-2">View <i
                            class="bi bi-arrow-right"></i></a>
                </div>
            </div>
            <div class="col-md-4 animate-fade-in-up animate-delay-3">
                <div class="stat-card">
                    <div class="stat-number" id="statCart">0</div>
                    <div class="stat-label">Cart Items</div>
                    <a href="cart.html" class="btn btn-sm btn-unimart-secondary mt-2">View Cart <i
                            class="bi bi-arrow-right"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="container page-wrapper">
        <h3 class="fw-bold mb-4">Quick Actions</h3>
        <div class="row g-4">
            <div class="col-md-3 col-6">
                <a href="catalog.html" class="text-decoration-none">
                    <div class="stat-card h-100 text-center">
                        <i class="bi bi-search display-4" style="color:var(--primary)"></i>
                        <h6 class="fw-bold mt-2">Browse Items</h6>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="my-listings.html" class="text-decoration-none">
                    <div class="stat-card h-100 text-center">
                        <i class="bi bi-plus-circle display-4" style="color:var(--success)"></i>
                        <h6 class="fw-bold mt-2">Post New Item</h6>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="orders.html" class="text-decoration-none">
                    <div class="stat-card h-100 text-center">
                        <i class="bi bi-receipt display-4" style="color:var(--secondary)"></i>
                        <h6 class="fw-bold mt-2">My Orders</h6>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="profile.html" class="text-decoration-none">
                    <div class="stat-card h-100 text-center">
                        <i class="bi bi-person display-4" style="color:var(--accent)"></i>
                        <h6 class="fw-bold mt-2">My Profile</h6>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-unimart">
        <div class="container">
            <div class="footer-bottom" style="border-top:none; margin-top:0; padding-top:0;">
                <p class="mb-0">&copy; 2025 UniMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function () {
            requireLogin(function (user) {
                $('#welcomeName').text(escapeHtml(user.name));
                // Load stats
                $.get('/api/users/stats', function (stats) {
                    $('#statListings').text(stats.listingsCount);
                    $('#statOrders').text(stats.ordersCount);
                });
                $.get('/api/cart', function (items) {
                    $('#statCart').text(items.length);
                });
            });
        });
    </script>
</body>

</html>
