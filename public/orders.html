<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Shared Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="page-wrapper" style="padding-top:100px;">
        <div class="container">
            <h1 class="page-title"><i class="bi bi-receipt"></i> My Orders</h1>
            <div id="ordersContent">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="text-muted mt-2">Loading orders...</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-unimart">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;margin-top:0;padding-top:0;">
                <p class="mb-0">&copy; 2025 UniMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function () {
            requireLogin(function () { loadOrders(); });
        });

        function loadOrders() {
            $.get('/api/orders', function (orders) {
                if (orders.length === 0) {
                    $('#ordersContent').html(`
                        <div class="text-center py-5">
                            <i class="bi bi-receipt display-1 text-muted"></i>
                            <h3 class="mt-3 text-muted">No orders yet</h3>
                            <p class="text-muted">Start shopping to see your orders here.</p>
                            <a href="catalog.html" class="btn btn-unimart mt-3"><i class="bi bi-search"></i> Browse Products</a>
                        </div>`);
                    return;
                }

                let html = '';
                orders.forEach(function (order) {
                    const date = new Date(order.created_at).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    const statusBadge = {
                        pending: '<span class="badge bg-warning text-dark">Pending</span>',
                        completed: '<span class="badge bg-success">Completed</span>',
                        cancelled: '<span class="badge bg-danger">Cancelled</span>'
                    }[order.status] || '<span class="badge bg-secondary">Unknown</span>';

                    let itemsHtml = '';
                    if (order.items && order.items.length > 0) {
                        order.items.forEach(function (item) {
                            itemsHtml += `
                                <div class="d-flex align-items-center gap-3 mb-2">
                                    <img src="${escapeHtml(item.image_url) || 'https://placehold.co/50x50/e2e8f0/475569?text=?'}" width="50" height="50" class="rounded" style="object-fit:cover;">
                                    <div class="flex-fill">
                                        <strong>${escapeHtml(item.title)}</strong>
                                        <div class="text-muted small">Qty: ${item.quantity} × AED ${parseFloat(item.price).toFixed(2)}</div>
                                    </div>
                                    <div class="fw-bold">AED ${(item.quantity * item.price).toFixed(2)}</div>
                                </div>`;
                        });
                    }

                    html += `
                        <div class="unimart-card p-4 mb-4 animate-fade-in-up">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="fw-bold mb-1">Order #${order.id}</h5>
                                    <small class="text-muted">${escapeHtml(date)}</small>
                                </div>
                                <div class="text-end">
                                    ${statusBadge}
                                    <div class="fw-bold mt-1" style="color:var(--primary); font-size:1.2rem;">AED ${parseFloat(order.total_price).toFixed(2)}</div>
                                </div>
                            </div>
                            <hr>
                            ${itemsHtml}
                        </div>`;
                });

                $('#ordersContent').html(html);
            }).fail(function () {
                $('#ordersContent').html('<div class="text-center py-5"><p class="text-danger">Failed to load orders.</p></div>');
            });
        }
    </script>
</body>

</html>
