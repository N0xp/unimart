<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Shared Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Page Content -->
    <div class="page-wrapper" style="padding-top:100px;">
        <div class="container">
            <h1 class="page-title">Browse Products</h1>

            <!-- Search & Filter Bar -->
            <div class="row mb-4 g-3 align-items-center">
                <div class="col-md-5">
                    <div class="search-bar">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search products...">
                    </div>
                </div>
                <div class="col-md-4">
                    <select class="form-select" id="categoryFilter"
                        style="border-radius:50px; padding:0.6rem 1rem; border: 2px solid var(--gray-200);">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sortFilter"
                        style="border-radius:50px; padding:0.6rem 1rem; border: 2px solid var(--gray-200);">
                        <option value="newest">Newest First</option>
                        <option value="price_asc">Price: Low → High</option>
                        <option value="price_desc">Price: High → Low</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="row g-4" id="productsGrid">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="text-muted mt-2">Loading products...</p>
                </div>
            </div>

            <!-- No Results -->
            <div class="text-center py-5 d-none" id="noResults">
                <i class="bi bi-search display-1 text-muted"></i>
                <h4 class="mt-3 text-muted">No products found</h4>
                <p class="text-muted">Try adjusting your search or filters.</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-unimart">
        <div class="container">
            <div class="footer-bottom" style="border-top:none; margin-top:0; padding-top:0;">
                <p class="mb-0">&copy; 2025 UniMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function () {
            // Load categories
            $.get('/api/categories', function (categories) {
                categories.forEach(function (cat) {
                    $('#categoryFilter').append(`<option value="${cat.id}">${escapeHtml(cat.name)}</option>`);
                });
                // Check URL params for pre-selected category
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('category')) {
                    $('#categoryFilter').val(urlParams.get('category'));
                }
                loadProducts();
            });

            // Event handlers for search/filter
            let searchTimeout;
            $('#searchInput').on('input', function () {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(loadProducts, 400);
            });
            $('#categoryFilter, #sortFilter').on('change', loadProducts);
        });

        function loadProducts() {
            const search = $('#searchInput').val().trim();
            const category = $('#categoryFilter').val();
            const sort = $('#sortFilter').val();

            $.get('/api/products', { search, category, sort }, function (products) {
                const grid = $('#productsGrid');
                grid.empty();

                if (products.length === 0) {
                    $('#noResults').removeClass('d-none');
                    return;
                }
                $('#noResults').addClass('d-none');

                products.forEach(function (p, i) {
                    const card = `
            <div class="col-lg-3 col-md-4 col-sm-6 animate-fade-in-up animate-delay-${(i % 4) + 1}">
              <div class="unimart-card">
                <div class="card-img-wrapper">
                  <img src="${escapeHtml(p.image_url) || 'https://placehold.co/400x300/e2e8f0/475569?text=No+Image'}" class="card-img-top" alt="${escapeHtml(p.title)}">
                </div>
                <div class="card-body">
                  <span class="card-category">${escapeHtml(p.category_name)}</span>
                  <h5 class="card-title mt-2">${escapeHtml(p.title)}</h5>
                  <p class="card-price">AED ${parseFloat(p.price).toFixed(2)}</p>
                  <p class="card-seller"><i class="bi bi-person"></i> ${escapeHtml(p.seller_name)}</p>
                  <a href="product-detail.html?id=${p.id}" class="btn btn-sm btn-unimart w-100">View Details</a>
                </div>
              </div>
            </div>`;
                    grid.append(card);
                });
            }).fail(function () {
                $('#productsGrid').html('<div class="col-12 text-center py-5"><p class="text-danger">Failed to load products. Please try again.</p></div>');
            });
        }
    </script>
</body>

</html>
