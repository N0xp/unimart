<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Shared Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="page-wrapper" style="padding-top:100px;">
        <div class="container">
            <h1 class="page-title"><i class="bi bi-credit-card"></i> Checkout</h1>

            <div class="row g-5" id="checkoutContent">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>

            <!-- Order Confirmation (hidden initially) -->
            <div class="text-center py-5 d-none" id="orderConfirmation">
                <div class="animate-fade-in-up">
                    <i class="bi bi-check-circle-fill display-1" style="color:var(--success)"></i>
                    <h2 class="fw-bold mt-3">Order Placed Successfully!</h2>
                    <p class="text-muted" id="confirmationMsg">Your order has been placed.</p>
                    <div class="d-flex gap-3 justify-content-center mt-4">
                        <a href="catalog.html" class="btn btn-unimart"><i class="bi bi-search"></i> Continue
                            Shopping</a>
                        <a href="orders.html" class="btn btn-unimart-secondary"><i class="bi bi-receipt"></i> View
                            Orders</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-unimart">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;margin-top:0;padding-top:0;">
                <p class="mb-0">&copy; 2025 UniMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/validation.js"></script>
    <script>
        $(document).ready(function () {
            requireLogin(function () { loadCheckout(); });
        });

        function loadCheckout() {
            $.get('/api/cart', function (items) {
                if (items.length === 0) {
                    $('#checkoutContent').html(`
            <div class="col-12 text-center py-5">
              <i class="bi bi-cart-x display-1 text-muted"></i>
              <h3 class="text-muted mt-3">Your cart is empty</h3>
              <a href="catalog.html" class="btn btn-unimart mt-3">Browse Products</a>
            </div>`);
                    return;
                }

                let total = 0;
                let summaryRows = '';
                items.forEach(function (item) {
                    const sub = item.price * item.quantity;
                    total += sub;
                    summaryRows += `
            <tr>
              <td>${escapeHtml(item.title)}</td>
              <td class="text-center">${item.quantity}</td>
              <td class="text-end">AED ${sub.toFixed(2)}</td>
            </tr>`;
                });

                $('#checkoutContent').html(`
          <!-- Order Summary -->
          <div class="col-lg-7 animate-fade-in-up">
            <div class="unimart-card p-4">
              <h4 class="fw-bold mb-3"><i class="bi bi-receipt"></i> Order Summary</h4>
              <table class="table">
                <thead><tr><th>Item</th><th class="text-center">Qty</th><th class="text-end">Subtotal</th></tr></thead>
                <tbody>${summaryRows}</tbody>
                <tfoot>
                  <tr class="cart-total-row"><td colspan="2" class="text-end">Total:</td><td class="text-end">AED ${total.toFixed(2)}</td></tr>
                </tfoot>
              </table>
            </div>
          </div>
          <!-- Delivery Form -->
          <div class="col-lg-5 animate-fade-in-up animate-delay-1">
            <div class="unimart-card p-4">
              <h4 class="fw-bold mb-3"><i class="bi bi-truck"></i> Delivery Details</h4>
              <form id="checkoutForm" novalidate>
                <div class="mb-3">
                  <label for="checkoutAddress" class="form-label fw-bold">Delivery Address</label>
                  <textarea class="form-control" id="checkoutAddress" rows="3" placeholder="Building, Room, Campus..." required></textarea>
                  <div class="form-error"></div>
                </div>
                <div class="mb-3">
                  <label for="checkoutPhone" class="form-label fw-bold">Phone Number</label>
                  <input type="tel" class="form-control" id="checkoutPhone" placeholder="05XXXXXXXX" required>
                  <div class="form-error"></div>
                </div>
                <button type="submit" class="btn btn-unimart w-100 btn-lg mt-2" id="placeOrderBtn">
                  <i class="bi bi-check-circle"></i> Place Order — AED ${total.toFixed(2)}
                </button>
              </form>
            </div>
          </div>`);

                // Handle form submit
                $('#checkoutForm').on('submit', function (e) {
                    e.preventDefault();
                    if (!validateCheckoutForm()) return;

                    const data = {
                        address: $('#checkoutAddress').val().trim(),
                        phone: $('#checkoutPhone').val().trim()
                    };

                    $('#placeOrderBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Placing order...');

                    $.ajax({
                        url: '/api/orders',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(data),
                        success: function (res) {
                            $('#checkoutContent').addClass('d-none');
                            $('#confirmationMsg').text(`Order #${res.orderId} has been placed. Total: AED ${total.toFixed(2)}`);
                            $('#orderConfirmation').removeClass('d-none');
                            updateCartBadge();
                        },
                        error: function (xhr) {
                            showToast(xhr.responseJSON?.error || 'Failed to place order.', 'danger');
                            $('#placeOrderBtn').prop('disabled', false).html(`<i class="bi bi-check-circle"></i> Place Order — AED ${total.toFixed(2)}`);
                        }
                    });
                });
            });
        }
    </script>
</body>

</html>
