<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Shared Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="page-wrapper" style="padding-top:100px;">
        <div class="container">
            <h1 class="page-title"><i class="bi bi-cart3"></i> Shopping Cart</h1>
            <div id="cartContent">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="text-muted mt-2">Loading cart...</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-unimart">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;margin-top:0;padding-top:0;">
                <p class="mb-0">&copy; 2025 UniMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Issue #17 FIX: Event listeners defined once outside loadCart, using delegation
        $(document).ready(function () {
            requireLogin(function () { loadCart(); });

            // Quantity buttons — defined ONCE (Issue #17 fix)
            $(document).on('click', '.qty-minus', function () {
                const id = $(this).data('id');
                const $row = $(`tr[data-id="${id}"]`);
                let qty = parseInt($row.find('.qty-display').text());
                if (qty <= 1) return;
                qty--;
                updateCartItem(id, qty, $row);
            });

            $(document).on('click', '.qty-plus', function () {
                const id = $(this).data('id');
                const $row = $(`tr[data-id="${id}"]`);
                let qty = parseInt($row.find('.qty-display').text());
                qty++;
                updateCartItem(id, qty, $row);
            });

            // Remove item — defined ONCE
            $(document).on('click', '.remove-item', function () {
                const id = $(this).data('id');
                $.ajax({
                    url: `/api/cart/${id}`,
                    method: 'DELETE',
                    success: function () {
                        showToast('Item removed.', 'success');
                        loadCart();
                        updateCartBadge();
                    }
                });
            });
        });

        function loadCart() {
            $.get('/api/cart', function (items) {
                if (items.length === 0) {
                    $('#cartContent').html(`
            <div class="text-center py-5">
              <i class="bi bi-cart-x display-1 text-muted"></i>
              <h3 class="mt-3 text-muted">Your cart is empty</h3>
              <a href="catalog.html" class="btn btn-unimart mt-3"><i class="bi bi-search"></i> Browse Products</a>
            </div>`);
                    return;
                }

                let total = 0;
                let rows = '';
                items.forEach(function (item) {
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    rows += `
            <tr data-id="${item.id}">
              <td>
                <div class="d-flex align-items-center gap-3">
                  <img src="${escapeHtml(item.image_url) || 'https://placehold.co/60x60/e2e8f0/475569?text=?'}" width="60" height="60" class="rounded" style="object-fit:cover;">
                  <div>
                    <strong>${escapeHtml(item.title)}</strong><br>
                    <small class="text-muted">${escapeHtml(item.category_name)}</small>
                  </div>
                </div>
              </td>
              <td class="text-center">AED ${parseFloat(item.price).toFixed(2)}</td>
              <td class="text-center">
                <button class="qty-btn qty-minus" data-id="${item.id}">−</button>
                <span class="mx-2 fw-bold qty-display">${item.quantity}</span>
                <button class="qty-btn qty-plus" data-id="${item.id}">+</button>
              </td>
              <td class="text-center fw-bold item-subtotal">AED ${subtotal.toFixed(2)}</td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-danger remove-item" data-id="${item.id}">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>`;
                });

                $('#cartContent').html(`
          <div class="table-responsive">
            <table class="table cart-table align-middle">
              <thead>
                <tr>
                  <th>Product</th>
                  <th class="text-center">Price</th>
                  <th class="text-center">Quantity</th>
                  <th class="text-center">Subtotal</th>
                  <th class="text-center">Action</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
              <tfoot>
                <tr class="cart-total-row">
                  <td colspan="3" class="text-end">Total:</td>
                  <td class="text-center" id="cartTotal">AED ${total.toFixed(2)}</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
          <div class="d-flex justify-content-between mt-3">
            <a href="catalog.html" class="btn btn-unimart-secondary"><i class="bi bi-arrow-left"></i> Continue Shopping</a>
            <a href="checkout.html" class="btn btn-unimart btn-lg"><i class="bi bi-credit-card"></i> Proceed to Checkout</a>
          </div>`);
            });
        }

        function updateCartItem(id, qty, $row) {
            $.ajax({
                url: `/api/cart/${id}`,
                method: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({ quantity: qty }),
                success: function () {
                    $row.find('.qty-display').text(qty);
                    const price = parseFloat($row.find('td:eq(1)').text().replace('AED ', ''));
                    const subtotal = price * qty;
                    $row.find('.item-subtotal').text('AED ' + subtotal.toFixed(2));
                    // Recalculate total
                    let total = 0;
                    $('.item-subtotal').each(function () {
                        total += parseFloat($(this).text().replace('AED ', ''));
                    });
                    $('#cartTotal').text('AED ' + total.toFixed(2));
                }
            });
        }
    </script>
</body>

</html>
