<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — UniMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Shared Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="page-wrapper" style="padding-top:100px;">
        <div class="container">
            <h1 class="page-title"><i class="bi bi-person-circle"></i> My Profile</h1>

            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="unimart-card p-4 animate-fade-in-up">
                        <div class="text-center mb-4">
                            <div
                                style="width:80px;height:80px;border-radius:50%;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:2rem;color:#fff;">
                                <i class="bi bi-person-fill"></i>
                            </div>
                            <h4 class="fw-bold mt-3" id="profileDisplayName">Loading...</h4>
                            <p class="text-muted" id="profileDisplayEmail">...</p>
                        </div>

                        <div id="profileAlert" class="alert d-none mb-3"></div>

                        <form id="profileForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" id="profileName" required>
                                <div class="form-error"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email <span class="text-muted">(cannot be
                                        changed)</span></label>
                                <input type="email" class="form-control" id="profileEmail" readonly disabled
                                    style="background:var(--gray-100);">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Phone</label>
                                <input type="tel" class="form-control" id="profilePhone" placeholder="05XXXXXXXX">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Address</label>
                                <textarea class="form-control" id="profileAddress" rows="2"
                                    placeholder="Your campus address..."></textarea>
                            </div>
                            <div class="mb-3 text-muted small">
                                <i class="bi bi-calendar3"></i> Member since: <span id="profileJoined">—</span>
                            </div>
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-unimart flex-fill" id="saveProfileBtn">
                                    <i class="bi bi-check-circle"></i> Save Changes
                                </button>
                                <a href="welcome.html" class="btn btn-unimart-secondary flex-fill">
                                    <i class="bi bi-arrow-left"></i> Dashboard
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-unimart">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;margin-top:0;padding-top:0;">
                <p class="mb-0">&copy; 2025 UniMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function () {
            requireLogin(function () {
                $.get('/api/users/profile', function (user) {
                    $('#profileDisplayName').text(escapeHtml(user.name));
                    $('#profileDisplayEmail').text(escapeHtml(user.email));
                    $('#profileName').val(user.name);
                    $('#profileEmail').val(user.email);
                    $('#profilePhone').val(user.phone || '');
                    $('#profileAddress').val(user.address || '');
                    $('#profileJoined').text(new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }));
                });
            });

            $('#profileForm').on('submit', function (e) {
                e.preventDefault();
                const name = $('#profileName').val().trim();
                if (name.length < 2) {
                    $('#profileName').addClass('is-invalid');
                    return;
                }

                const data = {
                    name: name,
                    phone: $('#profilePhone').val().trim() || null,
                    address: $('#profileAddress').val().trim() || null
                };

                $('#saveProfileBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Saving...');

                $.ajax({
                    url: '/api/users/profile',
                    method: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function () {
                        $('#profileDisplayName').text(escapeHtml(data.name));
                        $('#navUserName').text(escapeHtml(data.name));
                        $('#profileAlert').text('Profile updated successfully!').removeClass('d-none alert-danger').addClass('alert-success');
                        showToast('Profile saved!', 'success');
                        $('#saveProfileBtn').prop('disabled', false).html('<i class="bi bi-check-circle"></i> Save Changes');
                    },
                    error: function () {
                        $('#profileAlert').text('Failed to update profile.').removeClass('d-none alert-success').addClass('alert-danger');
                        $('#saveProfileBtn').prop('disabled', false).html('<i class="bi bi-check-circle"></i> Save Changes');
                    }
                });
            });
        });
    </script>
</body>

</html>
